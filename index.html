<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Mie Card Supermercato</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* ─── LOGIN ─── */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .login-logo { font-size: 64px; margin-bottom: 20px; display: block; }
        .login-title { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 8px; }
        .login-subtitle { font-size: 16px; color: #888; margin-bottom: 40px; }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .google-btn:hover {
            border-color: #667eea;
            box-shadow: 0 4px 16px rgba(102,126,234,0.25);
            transform: translateY(-2px);
        }

        .google-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .google-icon { width: 22px; height: 22px; }

        /* ─── APP ─── */
        .app-screen { display: none; }
        .container { max-width: 1200px; margin: 0 auto; }

        header {
            background: white;
            padding: 16px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .logo {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer;
            transition: transform 0.2s; flex-shrink: 0;
        }

        .logo:hover { transform: scale(1.05); }
        h1 { color: #333; font-size: 22px; }
        .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .user-info {
            display: flex; align-items: center; gap: 8px;
            background: #f8f9fa; padding: 8px 14px; border-radius: 20px;
        }

        .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }

        .user-avatar-placeholder {
            width: 28px; height: 28px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 13px; font-weight: 700;
        }

        .user-name {
            font-size: 14px; color: #555; font-weight: 500;
            max-width: 130px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }

        .logout-btn {
            background: #f3f4f6; border: none;
            padding: 8px 14px; border-radius: 20px;
            font-size: 13px; color: #666; cursor: pointer; transition: all 0.2s;
        }

        .logout-btn:hover { background: #fee2e2; color: #ef4444; }

        .mode-indicator {
            background: #f0f0f0; padding: 8px 16px;
            border-radius: 20px; font-size: 14px; color: #666;
        }

        .mode-indicator.edit-mode { background: #fef3c7; color: #92400e; }

        .add-card-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none;
            padding: 12px 24px; border-radius: 10px;
            font-size: 16px; cursor: pointer; display: none; transition: transform 0.2s;
        }

        .add-card-btn:hover { transform: translateY(-2px); }
        .add-card-btn.visible { display: block; }

        .search-container { max-width: 600px; margin: 0 auto 30px; }

        .search-box {
            width: 100%; padding: 15px 20px; font-size: 18px;
            border: none; border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-box:focus {
            outline: none; transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .card {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s; position: relative;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }

        .card-image {
            width: 100%; height: 200px; object-fit: contain;
            border-radius: 10px; background: #f8f9fa; margin-bottom: 15px;
        }

        .card-name { font-size: 24px; font-weight: 700; color: #333; text-align: center; }
        .card-actions { display: none; gap: 10px; margin-top: 15px; }
        .card-actions.visible { display: flex; }

        .btn {
            flex: 1; padding: 8px 16px; border: none;
            border-radius: 8px; cursor: pointer; font-size: 14px; transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn-edit { background: #3b82f6; color: white; }
        .btn-delete { background: #ef4444; color: white; }

        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }

        .modal.visible { display: flex; }

        .modal-content {
            background: white; padding: 30px; border-radius: 15px;
            max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;
        }

        .modal-header { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }

        .form-group input {
            width: 100%; padding: 12px;
            border: 2px solid #e5e7eb; border-radius: 8px;
            font-size: 16px; transition: border-color 0.2s;
        }

        .form-group input[type="file"] { padding: 8px; cursor: pointer; }
        .form-group input:focus { outline: none; border-color: #667eea; }

        .image-preview {
            width: 100%; max-height: 200px; object-fit: contain;
            border-radius: 8px; margin-top: 10px; background: #f8f9fa; display: none;
        }

        .image-preview.visible { display: block; }

        .upload-progress {
            display: none; margin-top: 10px;
            font-size: 14px; color: #667eea; text-align: center;
        }

        .upload-progress.visible { display: block; }

        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }

        .btn-primary {
            flex: 1; padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; transition: transform 0.2s;
        }

        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-secondary {
            flex: 1; padding: 12px; background: #6b7280;
            color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; transition: transform 0.2s;
        }

        .btn-secondary:hover { transform: translateY(-2px); }

        .empty-state { text-align: center; padding: 60px 20px; color: white; }
        .empty-state h2 { font-size: 32px; margin-bottom: 10px; }
        .empty-state p { font-size: 18px; opacity: 0.9; }

        .loading { text-align: center; padding: 40px; color: white; font-size: 18px; }

        .fullscreen-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            align-items: center; justify-content: center; padding: 20px;
        }

        .fullscreen-modal.visible { display: flex; }

        .fullscreen-content {
            max-width: 90%; max-height: 90%; background: white;
            border-radius: 15px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .fullscreen-close {
            position: absolute; top: 15px; right: 15px;
            background: #ef4444; color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; font-size: 24px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s; z-index: 10;
        }

        .fullscreen-close:hover { transform: scale(1.1); }

        .fullscreen-image {
            max-width: 100%; max-height: 60vh;
            object-fit: contain; border-radius: 10px; margin-bottom: 20px;
        }

        .fullscreen-name { font-size: 48px; font-weight: 700; color: #333; text-align: center; }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <span class="login-logo">🛒</span>
            <div class="login-title">Le Mie Card Supermercato</div>
            <div class="login-subtitle">Accedi per gestire le tue card fedeltà in modo privato</div>
            <button class="google-btn" id="googleLoginBtn">
                <svg class="google-icon" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Accedi con Google
            </button>
        </div>
    </div>

    <div class="app-screen" id="appScreen">
        <div class="container">
            <header>
                <div class="header-left">
                    <div class="logo" id="logo" title="Clicca 5 volte per modalità modifica">🛒</div>
                    <h1>Le Mie Card Supermercato</h1>
                </div>
                <div class="header-right">
                    <div class="user-info" id="userInfo">
                        <div class="user-avatar-placeholder" id="userAvatarPlaceholder"></div>
                        <span class="user-name" id="userName"></span>
                    </div>
                    <span class="mode-indicator" id="modeIndicator">Modalità Lettura</span>
                    <button class="logout-btn" id="logoutBtn">Esci</button>
                </div>
            </header>

            <button class="add-card-btn" id="addCardBtn">+ Aggiungi Card</button>

            <div class="search-container">
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 Cerca supermercato...">
            </div>

            <div id="loadingState" class="loading">Caricamento card...</div>

            <div id="emptyState" class="empty-state" style="display:none">
                <h2>📇</h2>
                <h2>Nessuna card salvata</h2>
                <p>Attiva la modalità modifica per aggiungere le tue card</p>
            </div>

            <div class="cards-grid" id="cardsGrid"></div>
        </div>
    </div>

    <div class="modal" id="cardModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Aggiungi Card</div>
            <form id="cardForm">
                <div class="form-group">
                    <label>Nome Supermercato</label>
                    <input type="text" id="cardName" placeholder="Es: Conad, Esselunga, Coop..." required>
                </div>
                <div class="form-group">
                    <label>Immagine Card</label>
                    <input type="file" id="cardImage" accept="image/*">
                    <img class="image-preview" id="imagePreview" alt="Anteprima">
                    <div class="upload-progress" id="uploadProgress">⏳ Caricamento immagine in corso...</div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary" id="submitBtn">Salva</button>
                    <button type="button" class="btn-secondary" id="cancelBtn">Annulla</button>
                </div>
            </form>
        </div>
    </div>

    <div class="fullscreen-modal" id="fullscreenModal">
        <div class="fullscreen-content">
            <button class="fullscreen-close" id="fullscreenClose">×</button>
            <img class="fullscreen-image" id="fullscreenImage" alt="Card">
            <div class="fullscreen-name" id="fullscreenName"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getFirestore, collection, doc, getDocs,
            addDoc, updateDoc, deleteDoc, query, orderBy
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import {
            getAuth, GoogleAuthProvider,
            signInWithPopup, signInWithRedirect, getRedirectResult,
            signOut, onAuthStateChanged
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // ─── CONFIGURAZIONE ───
        const firebaseConfig = {
            apiKey: "AIzaSyDXxsmKe58Ncsp1-p72OE-x0AQQzjevs6w",
            authDomain: "scard-88c52.firebaseapp.com",
            projectId: "scard-88c52",
            storageBucket: "scard-88c52.firebasestorage.app",
            messagingSenderId: "1005545272632",
            appId: "1:1005545272632:web:cd11baf4f892f023097dcd"
        };

        const CLOUDINARY_CLOUD  = 'dpjdgvydp';
        const CLOUDINARY_PRESET = 'supermarket_cards'; // da creare su Cloudinary

        const app      = initializeApp(firebaseConfig);
        const db       = getFirestore(app);
        const auth     = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ─── STATO ───
        let editMode             = false;
        let clickCount           = 0;
        let clickTimer           = null;
        let currentEditingCardId = null;
        let cards                = [];
        let selectedFile         = null;
        let currentUser          = null;

        // ─── DOM ───
        const loginScreen    = document.getElementById('loginScreen');
        const appScreen      = document.getElementById('appScreen');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn      = document.getElementById('logoutBtn');
        const userInfo       = document.getElementById('userInfo');
        const userName       = document.getElementById('userName');
        const userAvatarPlaceholder = document.getElementById('userAvatarPlaceholder');
        const logo           = document.getElementById('logo');
        const modeIndicator  = document.getElementById('modeIndicator');
        const addCardBtn     = document.getElementById('addCardBtn');
        const cardsGrid      = document.getElementById('cardsGrid');
        const cardModal      = document.getElementById('cardModal');
        const cardForm       = document.getElementById('cardForm');
        const modalTitle     = document.getElementById('modalTitle');
        const cancelBtn      = document.getElementById('cancelBtn');
        const submitBtn      = document.getElementById('submitBtn');
        const imagePreview   = document.getElementById('imagePreview');
        const cardImageInput = document.getElementById('cardImage');
        const uploadProgress = document.getElementById('uploadProgress');
        const loadingState   = document.getElementById('loadingState');
        const emptyState     = document.getElementById('emptyState');
        const fullscreenModal = document.getElementById('fullscreenModal');
        const fullscreenClose = document.getElementById('fullscreenClose');
        const fullscreenImage = document.getElementById('fullscreenImage');
        const fullscreenName  = document.getElementById('fullscreenName');
        const searchBox       = document.getElementById('searchBox');

        // ─── AUTH ───
        // Gestione redirect mobile
        getRedirectResult(auth).then(result => {
            if (result && result.user) {
                console.log('Login via redirect completato:', result.user.email);
            }
        }).catch(err => {
            console.error('Redirect error:', err);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                if (user.photoURL) {
                    userAvatarPlaceholder.style.display = 'none';
                    const img = document.createElement('img');
                    img.src = user.photoURL;
                    img.className = 'user-avatar';
                    userInfo.insertBefore(img, userName);
                } else {
                    userAvatarPlaceholder.textContent = (user.displayName || user.email || 'U')[0].toUpperCase();
                }
                userName.textContent = user.displayName || user.email;
                loginScreen.style.display = 'none';
                appScreen.style.display = 'block';
                loadCards();
            } else {
                currentUser = null;
                loginScreen.style.display = 'flex';
                appScreen.style.display = 'none';
            }
        });

        googleLoginBtn.addEventListener('click', async () => {
            try {
                googleLoginBtn.disabled = true;
                googleLoginBtn.textContent = 'Accesso in corso...';
                const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
                if (isMobile) {
                    await signInWithRedirect(auth, provider);
                } else {
                    await signInWithPopup(auth, provider);
                }
            } catch (error) {
                console.error('Errore login:', error);
                googleLoginBtn.disabled = false;
                googleLoginBtn.innerHTML = `<svg class="google-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Accedi con Google`;
                alert('Errore: ' + error.message);
            }
        });

        logoutBtn.addEventListener('click', async () => {
            editMode = false;
            await signOut(auth);
        });

        // ─── MODALITÀ MODIFICA ───
        logo.addEventListener('click', () => {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            if (clickCount === 5) {
                editMode = !editMode;
                updateMode();
                clickCount = 0;
            }
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        });

        function updateMode() {
            if (editMode) {
                modeIndicator.textContent = 'Modalità Modifica';
                modeIndicator.classList.add('edit-mode');
                addCardBtn.classList.add('visible');
                document.querySelectorAll('.card-actions').forEach(el => el.classList.add('visible'));
            } else {
                modeIndicator.textContent = 'Modalità Lettura';
                modeIndicator.classList.remove('edit-mode');
                addCardBtn.classList.remove('visible');
                document.querySelectorAll('.card-actions').forEach(el => el.classList.remove('visible'));
            }
        }

        // ─── CLOUDINARY UPLOAD ───
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_PRESET);
            formData.append('folder', `supermarket-cards/${currentUser.uid}`);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
                method: 'POST',
                body: formData
            });

            if (!res.ok) throw new Error('Errore upload immagine su Cloudinary');
            const data = await res.json();
            return data.secure_url;
        }

        // ─── MODAL ───
        addCardBtn.addEventListener('click', () => {
            currentEditingCardId = null;
            selectedFile = null;
            modalTitle.textContent = 'Aggiungi Card';
            cardForm.reset();
            cardImageInput.required = true;
            imagePreview.classList.remove('visible');
            uploadProgress.classList.remove('visible');
            cardModal.classList.add('visible');
        });

        cancelBtn.addEventListener('click', () => cardModal.classList.remove('visible'));
        fullscreenClose.addEventListener('click', () => fullscreenModal.classList.remove('visible'));
        fullscreenModal.addEventListener('click', (e) => {
            if (e.target === fullscreenModal) fullscreenModal.classList.remove('visible');
        });

        searchBox.addEventListener('input', (e) => renderCards(e.target.value.toLowerCase()));

        cardImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagePreview.src = ev.target.result;
                    imagePreview.classList.add('visible');
                };
                reader.readAsDataURL(file);
            } else {
                selectedFile = null;
                imagePreview.classList.remove('visible');
            }
        });

        cardForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;

            try {
                let imageUrl = null;

                if (selectedFile) {
                    uploadProgress.classList.add('visible');
                    imageUrl = await uploadToCloudinary(selectedFile);
                    uploadProgress.classList.remove('visible');
                } else if (currentEditingCardId) {
                    const existing = cards.find(c => c.id === currentEditingCardId);
                    imageUrl = existing?.imageUrl || null;
                }

                if (!imageUrl) throw new Error("Devi selezionare un'immagine");

                const cardData = {
                    name: document.getElementById('cardName').value,
                    imageUrl,
                    updatedAt: Date.now()
                };

                const cardsRef = collection(db, `users/${currentUser.uid}/cards`);

                if (currentEditingCardId) {
                    await updateDoc(doc(db, `users/${currentUser.uid}/cards`, currentEditingCardId), cardData);
                } else {
                    cardData.createdAt = Date.now();
                    await addDoc(cardsRef, cardData);
                }

                cardModal.classList.remove('visible');
                selectedFile = null;
                submitBtn.disabled = false;
                loadCards();

            } catch (error) {
                console.error('Errore:', error);
                submitBtn.disabled = false;
                uploadProgress.classList.remove('visible');
                alert('Errore: ' + error.message);
            }
        });

        // ─── CARICA CARD ───
        async function loadCards() {
            try {
                loadingState.style.display = 'block';
                emptyState.style.display = 'none';
                cardsGrid.innerHTML = '';

                const cardsRef = collection(db, `users/${currentUser.uid}/cards`);
                const q = query(cardsRef, orderBy('createdAt', 'asc'));
                const snapshot = await getDocs(q);

                cards = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCards();

            } catch (error) {
                console.error('Errore caricamento:', error);
                loadingState.style.display = 'none';
                emptyState.style.display = 'block';
            }
        }

        function renderCards(searchTerm = '') {
            cardsGrid.innerHTML = '';
            loadingState.style.display = 'none';
            emptyState.style.display = 'none';

            const filtered = cards.filter(card =>
                !searchTerm || card.name.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                emptyState.style.display = 'block';
                const h2 = emptyState.querySelectorAll('h2');
                const p = emptyState.querySelector('p');
                if (h2.length > 1) h2[1].textContent = searchTerm ? 'Nessuna card trovata' : 'Nessuna card salvata';
                if (p) p.textContent = searchTerm ? 'Prova con un altro termine' : 'Attiva la modalità modifica per aggiungere le tue card';
                return;
            }

            filtered.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.innerHTML = `
                    <img src="${card.imageUrl}" alt="${card.name}" class="card-image" style="cursor:pointer"
                         onclick="window.showFullscreen('${card.id}')"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2220%22 fill=%22%23999%22%3EImmagine non disponibile%3C/text%3E%3C/svg%3E'">
                    <div class="card-name">${card.name}</div>
                    <div class="card-actions ${editMode ? 'visible' : ''}">
                        <button class="btn btn-edit" onclick="window.editCard('${card.id}')">Modifica</button>
                        <button class="btn btn-delete" onclick="window.deleteCard('${card.id}')">Elimina</button>
                    </div>
                `;
                cardsGrid.appendChild(el);
            });
        }

        window.editCard = (id) => {
            currentEditingCardId = id;
            const card = cards.find(c => c.id === id);
            modalTitle.textContent = 'Modifica Card';
            document.getElementById('cardName').value = card.name;
            imagePreview.src = card.imageUrl;
            imagePreview.classList.add('visible');
            cardImageInput.value = '';
            cardImageInput.required = false;
            selectedFile = null;
            uploadProgress.classList.remove('visible');
            cardModal.classList.add('visible');
        };

        window.showFullscreen = (id) => {
            const card = cards.find(c => c.id === id);
            if (card) {
                fullscreenImage.src = card.imageUrl;
                fullscreenName.textContent = card.name;
                fullscreenModal.classList.add('visible');
            }
        };

        window.deleteCard = async (id) => {
            if (confirm('Sei sicuro di voler eliminare questa card?')) {
                try {
                    await deleteDoc(doc(db, `users/${currentUser.uid}/cards`, id));
                    loadCards();
                } catch (error) {
                    console.error('Errore eliminazione:', error);
                    alert("Errore nell'eliminazione della card");
                }
            }
        };
    </script>
</body>
</html>
